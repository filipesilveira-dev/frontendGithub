#Nome do workflow, aparece na aba "Actions"
name: Atividade EBAC - Pipeline CI/CD
#Definir quando o pipeline será disparado. Aqui especifica que, quando ocorrer um "push" na main branch, o pipeline será disparado.
on: 
  push:
    branches:
      -  main
    #Só dispara se os arquivos nessas pastas mudarem
    paths:
     #Só mudanças no código fonte
      - "exemplo_devops_ebac/app/**"
      #Mudanças nos próprios pipelines
      - ".github/workflows/**"
  workflow_dispatch: #habilitar o botão "Run workflow" no GitHub Actions

#Conjunto de passos (steps) do pipeline que está sendo criado
jobs:
  #Primeiro job: build
  build:
    #Imagem da máquina usada no CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./exemplo_devops_ebac
    #Passos que serão realizados
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      #Instala o Node na máquina que será criada para rodar o código
      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          #Especifica a versão do Node
          node-version: '22'
          cache: "npm"
          cache-dependency-path: "./exemplo_devops_ebac/package-lock.json"
          
      - name: Instalação das dependências
        run: npm install
        
        #Roda o build na máquina virtual criada
      - name: Rodar o build
        run: npm run build
          
  tests:
        #Imagem da máquina usada no CI
        runs-on: ubuntu-latest
        defaults:
          run:
            working-directory: ./exemplo_devops_ebac
        #Precisa que o build já tenha sido feito
        needs: build
        steps:
          - name: Checkout do código
            uses: actions/checkout@v6

          #Instala o Node na máquina que será criada para rodar o código
          - name: Instalação do Node
            uses: actions/setup-node@v4
            with:
              #Especifica a versão do Node
              node-version: '22'
              cache: "npm"
              cache-dependency-path: "./exemplo_devops_ebac/package-lock.json"
          
          - name: Instalação das dependências
            run: npm install
        
          #Roda o lint na máquina virtual criada
          - name: Rodar lint
            run: npm run lint
           
          - name: Verificar formatação
            run: npm run format
            
          #Roda os testes na máquina virtual criada
          - name: Rodar testes
            run: npm run test

  deploy:
          #Imagem da máquina usada no CI
          runs-on: ubuntu-latest
          defaults:
            run:
              working-directory: ./exemplo_devops_ebac
          #Precisa que o tests já tenha sido feito
          needs: tests
          steps:
            - name: Checkout do código
              uses: actions/checkout@v6

            #Instala o Node na máquina que será criada para rodar o código
            - name: Instalação do Node
              uses: actions/setup-node@v4
              with:
                #Especifica a versão do Node
                node-version: '22'
                cache: "npm"
                cache-dependency-path: "./exemplo_devops_ebac/package-lock.json"
          
            - name: Instalação Vercel CLI
              run: npm install -g vercel@latest
           
            - name: Deploy para Vercel
              run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
              #Especifica as variáveis que foram configuradas no GitHub Actions
              env:
                VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                VERCEL_PROJECT_ID: ${{secrets.VERCEL_PROJECT_EBAC_ID}}
